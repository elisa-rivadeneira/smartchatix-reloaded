<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#be185d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="#f8fafc"/>
  
  <!-- Laptop -->
  <rect x="200" y="180" width="400" height="280" rx="8" fill="#1e293b"/>
  <rect x="210" y="190" width="380" height="240" fill="#0f172a"/>
  
  <!-- Screen content -->
  <circle cx="280" cy="280" r="40" fill="url(#grad1)" opacity="0.3"/>
  <circle cx="520" cy="320" r="35" fill="url(#grad2)" opacity="0.3"/>
  
  <!-- AI Sparkles -->
  <path d="M 350 250 L 355 245 L 360 250 L 355 255 Z" fill="#fbbf24"/>
  <path d="M 450 290 L 455 285 L 460 290 L 455 295 Z" fill="#fbbf24"/>
  <path d="M 380 350 L 385 345 L 390 350 L 385 355 Z" fill="#fbbf24"/>
  
  <!-- Person silhouette -->
  <circle cx="400" cy="290" r="30" fill="url(#grad1)"/>
  <ellipse cx="400" cy="350" rx="50" ry="70" fill="url(#grad1)"/>
  
  <!-- Base -->
  <rect x="350" y="460" width="100" height="8" rx="4" fill="#cbd5e1"/>
  
  <text x="400" y="540" font-family="Inter, sans-serif" font-size="20" fill="#64748b" text-anchor="middle" font-weight="600">
    Profesional + IA
  </text>
</svg>
